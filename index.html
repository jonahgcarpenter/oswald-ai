<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oswald-AI</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #212121;
        --panel: #303030;
        --panel-2: #2a2a2a;
        --text: #f7f7f8;
        --muted: #c7c9d1;
        --border: #3f3f46;
        --accent: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }
      .user-menu {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10;
      }
      .user-toggle {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      }
      .user-toggle i {
        font-size: 1.2rem;
        line-height: 1;
      }
      .user-toggle:hover {
        background: #383838;
      }
      .user-toggle:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.3);
        outline-offset: 2px;
      }
      .user-panel {
        position: absolute;
        top: calc(100% + 12px);
        right: 0;
        width: 260px;
        padding: 14px;
        display: none;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }
      .user-panel.is-open {
        display: block;
      }
      .user-panel label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .user-panel label + label {
        margin-top: 12px;
      }
      .user-field {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        outline: none;
      }
      .user-field:focus {
        border-color: #5a5a5a;
      }
      .card {
        width: min(760px, calc(100vw - 32px));
        margin: 48px auto 24px;
        padding: 24px 8px;
      }
      .chat-shell {
        width: min(760px, calc(100vw - 32px));
        margin: 48px auto 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .hero {
        padding: 24px 8px 8px;
      }
      .status-row {
        display: none;
        margin: 0 0 18px;
        color: #fca5a5;
        font-size: 0.95rem;
      }
      .status-row.is-visible {
        display: block;
      }
      .chat-thread {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 8px 0 32px;
      }
      .empty-state {
        margin: auto 0;
        padding: 48px 8px;
        color: var(--muted);
        text-align: center;
        font-size: 1.05rem;
      }
      .empty-state.is-hidden {
        display: none;
      }
      .message-row {
        display: flex;
        width: 100%;
      }
      .message-row.user {
        justify-content: flex-end;
      }
      .message-row.assistant {
        justify-content: flex-start;
      }
      .message-bubble {
        max-width: min(85%, 680px);
        padding: 14px 18px;
        border-radius: 24px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .message-row.user .message-bubble {
        background: #ffffff;
        color: #111111;
      }
      .assistant-block {
        width: 100%;
        padding: 0 8px;
      }
      .assistant-content {
        color: var(--text);
        word-break: break-word;
        line-height: 1.65;
      }
      .assistant-content a,
      .reasoning-text a,
      .tool-result-body a {
        color: #8ab4ff;
      }
      .assistant-content > :first-child,
      .reasoning-text > :first-child {
        margin-top: 0;
      }
      .assistant-content > :last-child,
      .reasoning-text > :last-child {
        margin-bottom: 0;
      }
      .assistant-content p,
      .reasoning-text p {
        margin: 0 0 0.9em;
      }
      .assistant-content pre,
      .reasoning-text pre {
        margin: 0.75em 0;
        padding: 12px 14px;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #1c1c1c;
      }
      .assistant-content code,
      .reasoning-text code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .assistant-content :not(pre) > code,
      .reasoning-text :not(pre) > code {
        padding: 0.15em 0.4em;
        border-radius: 8px;
        background: var(--panel);
      }
      .assistant-content ul,
      .assistant-content ol,
      .reasoning-text ul,
      .reasoning-text ol {
        margin: 0 0 0.9em;
        padding-left: 1.4em;
      }
      .assistant-content blockquote,
      .reasoning-text blockquote {
        margin: 0.75em 0;
        padding-left: 12px;
        border-left: 3px solid var(--border);
        color: var(--muted);
      }
      .assistant-meta {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .assistant-section {
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
      }
      .assistant-section.is-hidden {
        display: none;
      }
      .assistant-section-title {
        width: 100%;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .assistant-section-title i {
        font-size: 0.9rem;
        transition: transform 0.15s ease;
      }
      .assistant-section-title[aria-expanded="true"] i {
        transform: rotate(90deg);
      }
      .assistant-section-body {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .reasoning-text {
        color: #e8eaf0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.55;
      }
      .assistant-section-body.is-collapsed {
        display: none;
      }
      .tool-chip {
        display: inline-flex;
        align-self: flex-start;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel-2);
        color: #f1f3f7;
        font-size: 0.9rem;
      }
      .reasoning-tool {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.02);
      }
      .reasoning-tool[open] {
        background: rgba(255, 255, 255, 0.035);
      }
      .reasoning-tool-summary {
        padding: 10px 12px;
        cursor: pointer;
        color: #f1f3f7;
        font-size: 0.95rem;
        font-weight: 500;
      }
      .reasoning-tool-summary::marker {
        color: var(--muted);
      }
      .tool-result-body {
        padding: 0 12px 12px;
        color: #e8eaf0;
      }
      .tool-result-body p {
        margin: 0 0 0.75em;
      }
      .tool-result-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .tool-result-item {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-2);
      }
      .tool-result-title {
        display: inline-block;
        margin-bottom: 6px;
        font-weight: 600;
        text-decoration: none;
      }
      .tool-result-url {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.85rem;
        word-break: break-all;
      }
      .tool-result-snippet {
        color: #e8eaf0;
        line-height: 1.5;
      }
      .memory-section {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-2);
      }
      .memory-section-title {
        margin-bottom: 8px;
        color: #f1f3f7;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .memory-entry + .memory-entry {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .memory-entry-statement {
        margin-bottom: 4px;
        color: #f7f7f8;
        font-weight: 500;
      }
      .memory-entry-evidence {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .input-bar {
        width: min(760px, calc(100vw - 32px));
        margin: 0 auto 32px;
      }
      .jump-to-bottom {
        position: fixed;
        right: 24px;
        bottom: 108px;
        z-index: 9;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(48, 48, 48, 0.96);
        color: var(--text);
        font: inherit;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
      }
      .jump-to-bottom.is-hidden {
        display: none;
      }
      .jump-to-bottom:hover {
        background: #383838;
      }
      .composer {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.22);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 1rem;
      }
      .prompt-input {
        flex: 1;
        min-height: 24px;
        max-height: 180px;
        padding: 10px 4px 10px 8px;
        border: 0;
        resize: none;
        background: transparent;
        color: var(--text);
        font-size: 1rem;
        line-height: 1.5;
        outline: none;
        font-family: inherit;
      }
      .prompt-input::placeholder {
        color: var(--muted);
      }
      .send-btn {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #111111;
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        flex: 0 0 auto;
      }
      .send-btn i {
        font-size: 1.35rem;
        line-height: 1;
      }
      .send-btn.is-hidden {
        visibility: hidden;
        pointer-events: none;
      }
      .send-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .send-btn:hover {
        filter: brightness(0.92);
      }
      .send-btn:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.3);
        outline-offset: 2px;
      }
      @media (max-width: 640px) {
        .chat-shell {
          margin-top: 32px;
        }
        .hero {
          padding-inline: 0;
        }
        h1 {
          font-size: 1.75rem;
        }
        .message-bubble {
          max-width: 92%;
        }
        .assistant-block {
          padding-inline: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="user-menu">
      <button
        class="user-toggle"
        id="user-toggle"
        type="button"
        aria-label="Open user settings"
      >
        <i class="bi bi-person"></i>
      </button>
      <div class="user-panel" id="user-panel">
        <label>
          user_id
          <input class="user-field" id="user-id" type="text" value="1" />
        </label>
        <label>
          display_name
          <input
            class="user-field"
            id="display-name"
            type="text"
            value="Jonah Carpenter"
          />
        </label>
      </div>
    </div>
    <main class="chat-shell">
      <section class="hero">
        <div class="status-row" id="status"></div>
      </section>
      <section class="chat-thread" id="chat-thread">
        <div class="empty-state" id="empty-state">
          Start a conversation with Oswald.
        </div>
      </section>
    </main>
    <form class="input-bar" id="prompt-form">
      <div class="composer">
        <textarea
          class="prompt-input"
          id="prompt-input"
          rows="1"
          placeholder="Message Oswald"
        ></textarea>
        <button class="send-btn" type="submit" aria-label="Send message">
          <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </form>
    <button class="jump-to-bottom is-hidden" id="jump-to-bottom" type="button">
      Jump to latest
    </button>
    <script>
      const form = document.getElementById("prompt-form");
      const input = document.getElementById("prompt-input");
      const userToggle = document.getElementById("user-toggle");
      const userPanel = document.getElementById("user-panel");
      const userIDInput = document.getElementById("user-id");
      const displayNameInput = document.getElementById("display-name");
      const sendButton = form.querySelector(".send-btn");
      const status = document.getElementById("status");
      const chatThread = document.getElementById("chat-thread");
      const emptyState = document.getElementById("empty-state");
      const jumpToBottomButton = document.getElementById("jump-to-bottom");

      const WS_URL = "ws://localhost:8080/ws";

      let socket = null;
      let isConnecting = false;
      let pendingAssistantMessage = null;
      let autoScrollEnabled = true;

      const AUTO_SCROLL_THRESHOLD = 120;

      marked.setOptions({
        breaks: true,
        gfm: true,
      });

      function renderMarkdown(text) {
        return marked.parse(text || "");
      }

      function escapeHTML(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatToolName(name) {
        return String(name || "Tool")
          .split("_")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function formatCategoryName(name) {
        return String(name || "")
          .split("_")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function setStatus(message) {
        status.textContent = message;
        status.classList.toggle("is-visible", Boolean(message));
      }

      function setSendDisabled(isDisabled) {
        sendButton.disabled = isDisabled;
      }

      function isNearBottom() {
        const scrollBottom = window.scrollY + window.innerHeight;
        return document.documentElement.scrollHeight - scrollBottom <= AUTO_SCROLL_THRESHOLD;
      }

      function syncAutoScrollState() {
        jumpToBottomButton.classList.toggle("is-hidden", autoScrollEnabled);
      }

      function scrollToBottom(options = {}) {
        const { force = false, smooth = true } = options;
        if (!force && !autoScrollEnabled) {
          return;
        }

        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: smooth ? "smooth" : "auto",
        });
      }

      function hideEmptyState() {
        emptyState.classList.add("is-hidden");
      }

      function appendUserMessage(text) {
        hideEmptyState();

        const row = document.createElement("div");
        row.className = "message-row user";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        chatThread.appendChild(row);
        scrollToBottom();
      }

      function createAssistantMessage() {
        hideEmptyState();

        const row = document.createElement("div");
        row.className = "message-row assistant";

        const block = document.createElement("div");
        block.className = "assistant-block";

        const meta = document.createElement("div");
        meta.className = "assistant-meta";

        const thinkingSection = document.createElement("div");
        thinkingSection.className = "assistant-section is-hidden";
        thinkingSection.innerHTML =
          '<button class="assistant-section-title" type="button" aria-expanded="false">Thinking <i class="bi bi-chevron-right"></i></button><div class="assistant-section-body is-collapsed"></div>';

        meta.appendChild(thinkingSection);

        const content = document.createElement("div");
        content.className = "assistant-content";

        block.appendChild(meta);
        block.appendChild(content);
        row.appendChild(block);
        chatThread.appendChild(row);

        const thinkingToggle = thinkingSection.querySelector(
          ".assistant-section-title",
        );
        const thinkingBody = thinkingSection.querySelector(
          ".assistant-section-body",
        );

        thinkingToggle.addEventListener("click", () => {
          const isExpanded =
            thinkingToggle.getAttribute("aria-expanded") === "true";
          thinkingToggle.setAttribute("aria-expanded", String(!isExpanded));
          thinkingBody.classList.toggle("is-collapsed", isExpanded);
        });

        pendingAssistantMessage = {
          row,
          thinkingSection,
          thinkingToggle,
          thinkingBody,
          content,
          contentText: "",
          lastReasoningNode: null,
        };

        scrollToBottom();
        return pendingAssistantMessage;
      }

      function ensurePendingAssistantMessage() {
        return pendingAssistantMessage || createAssistantMessage();
      }

      function appendThinking(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        if (!message.lastReasoningNode || !message.lastReasoningNode.classList.contains("reasoning-text")) {
          message.lastReasoningNode = document.createElement("div");
          message.lastReasoningNode.className = "reasoning-text";
          message.thinkingBody.appendChild(message.lastReasoningNode);
        }
        const nextText = (message.lastReasoningNode.dataset.rawText || "") + text;
        message.lastReasoningNode.dataset.rawText = nextText;
        message.lastReasoningNode.innerHTML = renderMarkdown(nextText);
        message.thinkingSection.classList.remove("is-hidden");
        scrollToBottom();
      }

      function appendToolCall(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        const match = text.match(/^\[Calling:\s*(.+?)\]$/);
        const label = match ? match[1] : text;
        const chip = document.createElement("div");
        chip.className = "tool-chip";
        chip.textContent = label;
        message.thinkingBody.appendChild(chip);
        message.lastReasoningNode = chip;
        message.thinkingSection.classList.remove("is-hidden");
        scrollToBottom();
      }

      function appendToolEvent(tool, mode) {
        if (!tool || !tool.name) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        const details = document.createElement("details");
        details.className = "reasoning-tool";

        const summary = document.createElement("summary");
        summary.className = "reasoning-tool-summary";

        if (mode === "call") {
          const query = tool.web_search?.query?.trim();
          if (tool.name === "web_search" && query) {
            summary.textContent = `Web Search: ${query}`;
          } else if (tool.name === "persistent_memory" && tool.persistent_memory?.action) {
            summary.textContent = `Persistent Memory: ${tool.persistent_memory.action}`;
          } else if (tool.name === "soul_memory" && tool.soul_memory?.action) {
            summary.textContent = `Soul Memory: ${tool.soul_memory.action}`;
          } else {
            summary.textContent = `Calling ${formatToolName(tool.name)}`;
          }
        } else {
          const resultCount = tool.web_search?.results?.length || 0;
          if (tool.name === "web_search") {
            summary.textContent = resultCount > 0
              ? `Web Search Results (${resultCount})`
              : tool.is_error
                ? "Web Search Error"
                : "Web Search Results";
          } else if (tool.name === "persistent_memory") {
            summary.textContent = tool.is_error
              ? "Persistent Memory Error"
              : `Persistent Memory ${tool.persistent_memory?.action ? `(${tool.persistent_memory.action})` : "Result"}`;
          } else if (tool.name === "soul_memory") {
            summary.textContent = tool.is_error
              ? "Soul Memory Error"
              : `Soul Memory ${tool.soul_memory?.action ? `(${tool.soul_memory.action})` : "Result"}`;
          } else {
            summary.textContent = tool.is_error
              ? `${formatToolName(tool.name)} Error`
              : `${formatToolName(tool.name)} Result`;
          }
        }

        const body = document.createElement("div");
        body.className = "tool-result-body";

        if (mode === "call") {
          if (tool.name === "web_search" && tool.web_search?.query) {
            body.innerHTML = renderMarkdown(`Searching for: \`${tool.web_search.query}\``);
          } else if (tool.name === "persistent_memory" && tool.persistent_memory) {
            const memory = tool.persistent_memory;
            const lines = [`Action: \`${memory.action || "unknown"}\``];
            if (memory.category) {
              lines.push(`Category: \`${memory.category}\``);
            }
            if (memory.statement) {
              lines.push(`Statement: ${memory.statement}`);
            }
            if (memory.evidence) {
              lines.push(`Evidence: ${memory.evidence}`);
            }
            body.innerHTML = renderMarkdown(lines.join("\n\n"));
          } else if (tool.name === "soul_memory" && tool.soul_memory) {
            const soul = tool.soul_memory;
            body.innerHTML = renderMarkdown(`Action: \`${soul.action || "unknown"}\``);
            if (soul.content) {
              body.innerHTML += renderMarkdown(`\`\`\`md\n${soul.content}\n\`\`\``);
            }
          } else if (tool.arguments && Object.keys(tool.arguments).length > 0) {
            body.innerHTML = renderMarkdown(`\`\`\`json\n${JSON.stringify(tool.arguments, null, 2)}\n\`\`\``);
          }
        } else if (tool.name === "web_search" && tool.web_search?.results?.length) {
          const list = document.createElement("div");
          list.className = "tool-result-list";
          for (const result of tool.web_search.results) {
            const item = document.createElement("div");
            item.className = "tool-result-item";
            item.innerHTML = `
              <a class="tool-result-title" href="${escapeHTML(result.url)}" target="_blank" rel="noreferrer">${escapeHTML(result.title || result.url)}</a>
              <div class="tool-result-url">${escapeHTML(result.url)}</div>
              <div class="tool-result-snippet">${escapeHTML(result.content || "")}</div>
            `;
            list.appendChild(item);
          }
          body.appendChild(list);
        } else if (tool.name === "persistent_memory" && tool.persistent_memory?.content?.sections) {
          const memory = tool.persistent_memory.content;
          if (memory.intro) {
            body.innerHTML = renderMarkdown(memory.intro);
          }
          for (const [category, entries] of Object.entries(memory.sections)) {
            const section = document.createElement("div");
            section.className = "memory-section";
            const title = document.createElement("div");
            title.className = "memory-section-title";
            title.textContent = formatCategoryName(category);
            section.appendChild(title);
            for (const entry of entries) {
              const item = document.createElement("div");
              item.className = "memory-entry";
              item.innerHTML = `
                <div class="memory-entry-statement">${escapeHTML(entry.statement || "")}</div>
                <div class="memory-entry-evidence">${escapeHTML(entry.evidence || "")}</div>
              `;
              section.appendChild(item);
            }
            body.appendChild(section);
          }
        } else if (tool.name === "soul_memory" && tool.soul_memory?.content) {
          body.innerHTML = renderMarkdown(`\`\`\`md\n${tool.soul_memory.content}\n\`\`\``);
        } else if (tool.result_text) {
          body.innerHTML = renderMarkdown(tool.result_text);
        }

        if (!body.innerHTML.trim() && body.childElementCount === 0) {
          body.innerHTML = renderMarkdown(
            mode === "call" ? formatToolName(tool.name) : "No result details available.",
          );
        }

        details.appendChild(summary);
        details.appendChild(body);
        message.thinkingBody.appendChild(details);
        message.lastReasoningNode = details;
        message.thinkingSection.classList.remove("is-hidden");
        scrollToBottom();
      }

      function appendContent(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        message.contentText += text;
        message.content.innerHTML = renderMarkdown(message.contentText);
        scrollToBottom();
      }

      function finalizeAssistantMessage(payload) {
        const hasVisibleData =
          payload && (payload.response || payload.thinking || payload.error);
        if (!pendingAssistantMessage && !hasVisibleData) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        if (payload) {
          if (payload.thinking && message.thinkingBody.childElementCount === 0) {
            appendThinking(payload.thinking);
          }
          if (payload.response) {
            message.contentText = payload.response;
            message.content.innerHTML = renderMarkdown(payload.response);
          }
          if (payload.error) {
            message.contentText = `Error: ${payload.error}`;
            message.content.innerHTML = renderMarkdown(message.contentText);
          }
        }

        pendingAssistantMessage = null;
        scrollToBottom();
      }

      function connectWebSocket() {
        if (
          socket &&
          (socket.readyState === WebSocket.OPEN ||
            socket.readyState === WebSocket.CONNECTING)
        ) {
          return;
        }
        if (isConnecting) {
          return;
        }

        isConnecting = true;
        setStatus("");
        setSendDisabled(true);

        socket = new WebSocket(WS_URL);

        socket.addEventListener("open", () => {
          isConnecting = false;
          setStatus("");
          setSendDisabled(false);
          syncSendButton();
        });

        socket.addEventListener("message", (event) => {
          try {
            const payload = JSON.parse(event.data);
            console.log("WS message:", payload);

            if (payload.type === "thinking") {
              appendThinking(payload.text || "");
              return;
            }

            if (payload.type === "tool_call") {
              appendToolEvent(payload.tool, "call");
              return;
            }

            if (payload.type === "tool_result") {
              appendToolEvent(payload.tool, "result");
              return;
            }

            if (payload.type === "status") {
              if (payload.text && !/^\[Calling:\s*(.+?)\]$/.test(payload.text)) {
                appendToolCall(payload.text);
              }
              return;
            }

            if (payload.type === "content") {
              appendContent(payload.text || "");
              return;
            }

            if (payload.error) {
              setStatus(`Error: ${payload.error}`);
            }

            if (payload.response || payload.thinking || payload.error) {
              finalizeAssistantMessage(payload);
              setStatus(payload.error ? `Error: ${payload.error}` : "");
            }
          } catch (error) {
            console.log("WS raw message:", event.data);
          }
        });

        socket.addEventListener("close", () => {
          isConnecting = false;
          setStatus("WebSocket disconnected");
          setSendDisabled(true);
          syncSendButton();
        });

        socket.addEventListener("error", () => {
          isConnecting = false;
          setStatus("Connection error");
          setSendDisabled(true);
          syncSendButton();
        });
      }

      function autoResize() {
        input.style.height = "auto";
        input.style.height = `${input.scrollHeight}px`;
      }

      function syncSendButton() {
        sendButton.classList.toggle(
          "is-hidden",
          input.value.trim().length === 0,
        );
      }

      function submitPrompt() {
        const prompt = input.value.trim();
        const userID = userIDInput.value.trim();
        const displayName = displayNameInput.value.trim();
        if (!prompt) {
          return;
        }

        if (!socket || socket.readyState !== WebSocket.OPEN) {
          setStatus("WebSocket is not connected");
          connectWebSocket();
          return;
        }

        const payload = {
          user_id: userID,
          display_name: displayName,
          prompt,
        };

        autoScrollEnabled = true;
        syncAutoScrollState();
        appendUserMessage(prompt);
        createAssistantMessage();
        socket.send(JSON.stringify(payload));
        console.log("WS send:", payload);
        setStatus("");
        input.value = "";
        autoResize();
        syncSendButton();
      }

      userToggle.addEventListener("click", () => {
        userPanel.classList.toggle("is-open");
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".user-menu")) {
          userPanel.classList.remove("is-open");
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          userPanel.classList.remove("is-open");
        }
      });

      input.addEventListener("input", () => {
        autoResize();
        syncSendButton();
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          submitPrompt();
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        submitPrompt();
      });

      window.addEventListener("scroll", () => {
        autoScrollEnabled = isNearBottom();
        syncAutoScrollState();
      }, { passive: true });

      jumpToBottomButton.addEventListener("click", () => {
        autoScrollEnabled = true;
        syncAutoScrollState();
        scrollToBottom({ force: true, smooth: true });
      });

      autoResize();
      syncSendButton();
      syncAutoScrollState();
      connectWebSocket();
    </script>
  </body>
</html>
