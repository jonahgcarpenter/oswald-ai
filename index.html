<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oswald-AI</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #212121;
        --panel: #303030;
        --panel-2: #2a2a2a;
        --text: #ececec;
        --muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Arial, sans-serif;
      }
      .user-menu {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10;
      }
      .user-toggle {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      }
      .user-toggle i {
        font-size: 1.2rem;
        line-height: 1;
      }
      .user-toggle:hover {
        background: #383838;
      }
      .user-toggle:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.3);
        outline-offset: 2px;
      }
      .user-panel {
        position: absolute;
        top: calc(100% + 12px);
        right: 0;
        width: 260px;
        padding: 14px;
        display: none;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }
      .user-panel.is-open {
        display: block;
      }
      .user-panel label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .user-panel label + label {
        margin-top: 12px;
      }
      .user-field {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        outline: none;
      }
      .user-field:focus {
        border-color: #5a5a5a;
      }
      .card {
        width: min(760px, calc(100vw - 32px));
        margin: 48px auto 24px;
        padding: 24px 8px;
      }
      .chat-shell {
        width: min(760px, calc(100vw - 32px));
        margin: 48px auto 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .hero {
        padding: 24px 8px 8px;
      }
      .status-row {
        display: none;
        margin: 0 0 18px;
        color: #fca5a5;
        font-size: 0.95rem;
      }
      .status-row.is-visible {
        display: block;
      }
      .chat-thread {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 8px 0 32px;
      }
      .empty-state {
        margin: auto 0;
        padding: 48px 8px;
        color: var(--muted);
        text-align: center;
        font-size: 1.05rem;
      }
      .empty-state.is-hidden {
        display: none;
      }
      .message-row {
        display: flex;
        width: 100%;
      }
      .message-row.user {
        justify-content: flex-end;
      }
      .message-row.assistant {
        justify-content: flex-start;
      }
      .message-bubble {
        max-width: min(85%, 680px);
        padding: 14px 18px;
        border-radius: 24px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .message-row.user .message-bubble {
        background: #ffffff;
        color: #111111;
      }
      .assistant-block {
        width: 100%;
        padding: 0 8px;
      }
      .assistant-content {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.65;
      }
      .assistant-meta {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .assistant-section {
        padding: 12px 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
      }
      .assistant-section.is-hidden {
        display: none;
      }
      .assistant-section-title {
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .assistant-section-body {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.55;
      }
      .tool-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tool-chip {
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--text);
        font-size: 0.9rem;
      }
      .input-bar {
        width: min(760px, calc(100vw - 32px));
        margin: 0 auto 32px;
      }
      .composer {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        padding: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.22);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 1rem;
      }
      .prompt-input {
        flex: 1;
        min-height: 24px;
        max-height: 180px;
        padding: 10px 4px 10px 8px;
        border: 0;
        resize: none;
        background: transparent;
        color: var(--text);
        font-size: 1rem;
        line-height: 1.5;
        outline: none;
        font-family: inherit;
      }
      .prompt-input::placeholder {
        color: var(--muted);
      }
      .send-btn {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #111111;
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        flex: 0 0 auto;
      }
      .send-btn i {
        font-size: 1.35rem;
        line-height: 1;
      }
      .send-btn.is-hidden {
        visibility: hidden;
        pointer-events: none;
      }
      .send-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .send-btn:hover {
        filter: brightness(0.92);
      }
      .send-btn:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.3);
        outline-offset: 2px;
      }
      @media (max-width: 640px) {
        .chat-shell {
          margin-top: 32px;
        }
        .hero {
          padding-inline: 0;
        }
        h1 {
          font-size: 1.75rem;
        }
        .message-bubble {
          max-width: 92%;
        }
        .assistant-block {
          padding-inline: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="user-menu">
      <button
        class="user-toggle"
        id="user-toggle"
        type="button"
        aria-label="Open user settings"
      >
        <i class="bi bi-person"></i>
      </button>
      <div class="user-panel" id="user-panel">
        <label>
          user_id
          <input class="user-field" id="user-id" type="text" value="1" />
        </label>
        <label>
          display_name
          <input
            class="user-field"
            id="display-name"
            type="text"
            value="Jonah Carpenter"
          />
        </label>
      </div>
    </div>
    <main class="chat-shell">
      <section class="hero">
        <div class="status-row" id="status"></div>
      </section>
      <section class="chat-thread" id="chat-thread">
        <div class="empty-state" id="empty-state">
          Start a conversation with Oswald.
        </div>
      </section>
    </main>
    <form class="input-bar" id="prompt-form">
      <div class="composer">
        <textarea
          class="prompt-input"
          id="prompt-input"
          rows="1"
          placeholder="Message Oswald"
        ></textarea>
        <button class="send-btn" type="submit" aria-label="Send message">
          <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </form>
    <script>
      const form = document.getElementById("prompt-form");
      const input = document.getElementById("prompt-input");
      const userToggle = document.getElementById("user-toggle");
      const userPanel = document.getElementById("user-panel");
      const userIDInput = document.getElementById("user-id");
      const displayNameInput = document.getElementById("display-name");
      const sendButton = form.querySelector(".send-btn");
      const status = document.getElementById("status");
      const chatThread = document.getElementById("chat-thread");
      const emptyState = document.getElementById("empty-state");

      const WS_URL = "ws://localhost:8080/ws";

      let socket = null;
      let isConnecting = false;
      let pendingAssistantMessage = null;

      function setStatus(message) {
        status.textContent = message;
        status.classList.toggle("is-visible", Boolean(message));
      }

      function setSendDisabled(isDisabled) {
        sendButton.disabled = isDisabled;
      }

      function scrollToBottom() {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth",
        });
      }

      function hideEmptyState() {
        emptyState.classList.add("is-hidden");
      }

      function appendUserMessage(text) {
        hideEmptyState();

        const row = document.createElement("div");
        row.className = "message-row user";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        chatThread.appendChild(row);
        scrollToBottom();
      }

      function createAssistantMessage() {
        hideEmptyState();

        const row = document.createElement("div");
        row.className = "message-row assistant";

        const block = document.createElement("div");
        block.className = "assistant-block";

        const meta = document.createElement("div");
        meta.className = "assistant-meta";

        const thinkingSection = document.createElement("div");
        thinkingSection.className = "assistant-section is-hidden";
        thinkingSection.innerHTML =
          '<div class="assistant-section-title">Thinking</div><div class="assistant-section-body"></div>';

        const toolSection = document.createElement("div");
        toolSection.className = "assistant-section is-hidden";
        toolSection.innerHTML =
          '<div class="assistant-section-title">Tools</div><div class="tool-list"></div>';

        meta.appendChild(thinkingSection);
        meta.appendChild(toolSection);

        const content = document.createElement("div");
        content.className = "assistant-content";

        block.appendChild(meta);
        block.appendChild(content);
        row.appendChild(block);
        chatThread.appendChild(row);

        pendingAssistantMessage = {
          row,
          thinkingSection,
          thinkingBody: thinkingSection.querySelector(
            ".assistant-section-body",
          ),
          toolSection,
          toolList: toolSection.querySelector(".tool-list"),
          content,
          thinkingText: "",
          contentText: "",
          tools: new Set(),
        };

        scrollToBottom();
        return pendingAssistantMessage;
      }

      function ensurePendingAssistantMessage() {
        return pendingAssistantMessage || createAssistantMessage();
      }

      function appendThinking(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        message.thinkingText += text;
        message.thinkingBody.textContent = message.thinkingText;
        message.thinkingSection.classList.remove("is-hidden");
        scrollToBottom();
      }

      function appendToolCall(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        const match = text.match(/^\[Calling:\s*(.+?)\]$/);
        const label = match ? match[1] : text;
        if (message.tools.has(label)) {
          return;
        }

        message.tools.add(label);
        const chip = document.createElement("div");
        chip.className = "tool-chip";
        chip.textContent = label;
        message.toolList.appendChild(chip);
        message.toolSection.classList.remove("is-hidden");
        scrollToBottom();
      }

      function appendContent(text) {
        if (!text) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        message.contentText += text;
        message.content.textContent = message.contentText;
        scrollToBottom();
      }

      function finalizeAssistantMessage(payload) {
        const hasVisibleData =
          payload && (payload.response || payload.thinking || payload.error);
        if (!pendingAssistantMessage && !hasVisibleData) {
          return;
        }

        const message = ensurePendingAssistantMessage();
        if (payload) {
          if (payload.thinking && message.thinkingText.length === 0) {
            message.thinkingText = payload.thinking;
            message.thinkingBody.textContent = payload.thinking;
            message.thinkingSection.classList.remove("is-hidden");
          }
          if (payload.response) {
            message.contentText = payload.response;
            message.content.textContent = payload.response;
          }
          if (payload.error) {
            message.contentText = `Error: ${payload.error}`;
            message.content.textContent = message.contentText;
          }
        }

        pendingAssistantMessage = null;
        scrollToBottom();
      }

      function connectWebSocket() {
        if (
          socket &&
          (socket.readyState === WebSocket.OPEN ||
            socket.readyState === WebSocket.CONNECTING)
        ) {
          return;
        }
        if (isConnecting) {
          return;
        }

        isConnecting = true;
        setStatus("");
        setSendDisabled(true);

        socket = new WebSocket(WS_URL);

        socket.addEventListener("open", () => {
          isConnecting = false;
          setStatus("");
          setSendDisabled(false);
          syncSendButton();
        });

        socket.addEventListener("message", (event) => {
          try {
            const payload = JSON.parse(event.data);
            console.log("WS message:", payload);

            if (payload.type === "thinking") {
              appendThinking(payload.text || "");
              return;
            }

            if (payload.type === "status") {
              appendToolCall(payload.text || "");
              return;
            }

            if (payload.type === "content") {
              appendContent(payload.text || "");
              return;
            }

            if (payload.error) {
              setStatus(`Error: ${payload.error}`);
            }

            if (payload.response || payload.thinking || payload.error) {
              finalizeAssistantMessage(payload);
              setStatus(payload.error ? `Error: ${payload.error}` : "");
            }
          } catch (error) {
            console.log("WS raw message:", event.data);
          }
        });

        socket.addEventListener("close", () => {
          isConnecting = false;
          setStatus("WebSocket disconnected");
          setSendDisabled(true);
          syncSendButton();
        });

        socket.addEventListener("error", () => {
          isConnecting = false;
          setStatus("Connection error");
          setSendDisabled(true);
          syncSendButton();
        });
      }

      function autoResize() {
        input.style.height = "auto";
        input.style.height = `${input.scrollHeight}px`;
      }

      function syncSendButton() {
        sendButton.classList.toggle(
          "is-hidden",
          input.value.trim().length === 0,
        );
      }

      function submitPrompt() {
        const prompt = input.value.trim();
        const userID = userIDInput.value.trim();
        const displayName = displayNameInput.value.trim();
        if (!prompt) {
          return;
        }

        if (!socket || socket.readyState !== WebSocket.OPEN) {
          setStatus("WebSocket is not connected");
          connectWebSocket();
          return;
        }

        const payload = {
          user_id: userID,
          display_name: displayName,
          prompt,
        };

        appendUserMessage(prompt);
        createAssistantMessage();
        socket.send(JSON.stringify(payload));
        console.log("WS send:", payload);
        setStatus("");
        input.value = "";
        autoResize();
        syncSendButton();
      }

      userToggle.addEventListener("click", () => {
        userPanel.classList.toggle("is-open");
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".user-menu")) {
          userPanel.classList.remove("is-open");
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          userPanel.classList.remove("is-open");
        }
      });

      input.addEventListener("input", () => {
        autoResize();
        syncSendButton();
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          submitPrompt();
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        submitPrompt();
      });

      autoResize();
      syncSendButton();
      connectWebSocket();
    </script>
  </body>
</html>
